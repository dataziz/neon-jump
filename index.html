<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SHAKE ARENA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    
    <style>
        :root { --neon: #00f2ff; --dark: #050505; --red: #ff3131; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .card { background: rgba(15, 15, 15, 0.95); border: 2px solid var(--neon); border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.3); max-width: 450px; width: 90%; z-index: 10; }
        .mascot { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--neon); margin-bottom: 15px; }
        
        h1 { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        input { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--neon); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 10px; }

        /* Bigger Camera Display */
        #game-screen { display: none; flex-direction: column; width: 100vw; height: 100vh; align-items: center; justify-content: center; background: black; }
        canvas { 
            width: 95vw; 
            height: 80vh; 
            object-fit: contain;
            border: 2px solid var(--neon);
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            border-radius: 10px;
        }

        .stats { position: absolute; top: 10px; display: flex; gap: 50px; font-size: 3rem; font-weight: 900; z-index: 5; text-shadow: 0 0 15px black; }
        #timer { color: var(--red); }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="auth-screen" class="card">
        <img src="china beria.jpg" class="mascot">
        <h1>Neon Arena</h1>
        <input type="text" id="u-mail" placeholder="Gmail">
        <input type="password" id="u-pass" placeholder="Password">
        <button onclick="showConfirm()">ENTER ARENA</button>
    </div>

    <!-- Confirmation: "Are you sure?" -->
    <div id="confirm-screen" class="overlay">
        <h1 style="font-size: 3rem;">ARE YOU SURE?</h1>
        <p style="font-size: 1.5rem; color: #ccc; margin-bottom: 30px;">The 20s timer starts as soon as you hit YES.</p>
        <div style="display: flex; gap: 20px;">
            <button style="width: 150px; background: var(--red);" onclick="location.reload()">NO</button>
            <button style="width: 150px;" onclick="startGame()">YES!</button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen">
        <div class="stats">
            <div>SHAKES: <span id="count-val">0</span></div>
            <div>TIME: <span id="timer">20</span>s</div>
        </div>
        <video id="webcam" style="display:none;" playsinline></video>
        <canvas id="canvas-output"></canvas>
    </div>

    <script>
        let count = 0;
        let timeLeft = 20;
        let side = "center"; // Tracking: left, right, or center
        let gameActive = false;

        function showConfirm() {
            console.log("Input:", document.getElementById('u-mail').value, document.getElementById('u-pass').value);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('confirm-screen').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('confirm-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            initAI();
        }

        function initAI() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('canvas-output');
            const ctx = canvas.getContext('2d');
            const countLabel = document.getElementById('count-val');

            const pose = new Pose({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
            });

            // Complexity 0 = Fastest speed for iPhone/PC
            pose.setOptions({ modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

            pose.onResults((results) => {
                if (!results.poseLandmarks) return;

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

                if (gameActive) {
                    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00f2ff', lineWidth: 4});
                    
                    // SIDE-TO-SIDE LOGIC (X-Axis)
                    // Nose is Landmark 0. Standard center is ~0.5.
                    const noseX = results.poseLandmarks[0].x;

                    if (noseX > 0.58 && side !== "left") {
                        side = "left";
                    } 
                    if (noseX < 0.42 && side !== "right") {
                        side = "right";
                        count++;
                        countLabel.innerText = count;
                    }
                }
                ctx.restore();
            });

            const camera = new Camera(video, {
                onFrame: async () => { 
                    await pose.send({image: video}); 
                    if(!gameActive) {
                        gameActive = true;
                        runTimer();
                    }
                },
                width: 1280, height: 720 // High res but Lite model keeps it fast
            });
            camera.start();
        }

        function runTimer() {
            const clock = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(clock);
                    gameActive = false;
                    alert("GAME OVER! Shakes: " + count);
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>
