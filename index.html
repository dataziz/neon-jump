<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON FAST SHAKE</title>
    <!-- Faster Face-Only Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        :root { --neon: #00f2ff; --dark: #020202; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: rgba(0,0,0,0.8); }
        .card { background: #111; border: 2px solid var(--neon); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px var(--neon); width: 300px; }
        .mascot { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 2px solid var(--neon); }
        h1 { color: var(--neon); margin: 10px 0; font-size: 1.5rem; }
        button { background: var(--neon); border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Full Screen Camera */
        #game-screen { display: none; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        .stats { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 20px black; pointer-events: none; }
    </style>
</head>
<body>

    <!-- Login/Auth -->
    <div id="auth-screen" class="ui-layer">
        <div class="card">
            <img src="china beria.jpg" class="mascot">
            <h1>NEON ARENA</h1>
            <input type="text" id="email" placeholder="Gmail" style="width:90%; padding:10px; margin-bottom:5px; background:#222; color:white; border:1px solid #444;">
            <input type="password" id="pass" placeholder="Password" style="width:90%; padding:10px; margin-bottom:15px; background:#222; color:white; border:1px solid #444;">
            <button onclick="askSure()">ENTER</button>
        </div>
    </div>

    <!-- Confirmation Overlay -->
    <div id="confirm-screen" class="ui-layer" style="display:none;">
        <h1 style="font-size: 3rem;">ARE YOU SURE?</h1>
        <p>The 20s timer starts NOW.</p>
        <button style="width:200px;" onclick="startGame()">YES, START!</button>
    </div>

    <!-- Game -->
    <div id="game-screen">
        <div class="stats">
            <div style="color:var(--neon)">POINTS: <span id="score">0</span></div>
            <div style="color:#ff3131">TIME: <span id="timer">20</span>s</div>
        </div>
        <video id="webcam" style="display:none;" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        let score = 0;
        let timeLeft = 20;
        let gameActive = false;
        let lastSide = "center";

        function askSure() {
            console.log("Captured:", document.getElementById('email').value, document.getElementById('pass').value);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('confirm-screen').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('confirm-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            initFaceScan();
        }

        function initFaceScan() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('output_canvas');
            const ctx = canvas.getContext('2d');

            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            // Fast settings for Face Only
            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: false,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults((results) => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

                if (results.multiFaceLandmarks && gameActive) {
                    const landmarks = results.multiFaceLandmarks[0];
                    const nose = landmarks[1]; // Nose tip

                    // Side-to-Side Logic
                    if (nose.x > 0.55 && lastSide !== "left") {
                        lastSide = "left";
                    } else if (nose.x < 0.45 && lastSide === "left") {
                        lastSide = "right";
                        // MULTIPLIER: 3 shakes = 6 points (2 points per shake)
                        score += 2; 
                        document.getElementById('score').innerText = score;
                    }
                }
                ctx.restore();
            });

            const camera = new Camera(video, {
                onFrame: async () => {
                    await faceMesh.send({image: video});
                    if(!gameActive) {
                        gameActive = true;
                        startTimer();
                    }
                },
                width: 640, height: 480
            });
            camera.start();
        }

        function startTimer() {
            const countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    gameActive = false;
                    alert("TIME OVER! Score: " + score);
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>
